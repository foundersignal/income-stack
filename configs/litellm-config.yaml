router_settings:
  routing_strategy: usage-based-routing-v2
  num_retries: 3
  retry_after: 5
  allowed_fails: 2
  cooldown_time: 60
  context_window_fallbacks:
  - gpt-4o:
    - complex
    - power
  - agent:
    - complex
    - power
  - fast:
    - complex
    - power
  - coding:
    - complex
    - power
  fallbacks:
  - gpt-4o:
    - complex
  - agent:
    - complex
  - fast:
    - complex
  - coding:
    - complex
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  ui_username: admin
  ui_password: admin123
  database_url: postgresql://litellm:litellm123@localhost:5432/litellm
litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 3
